<div id="catalogDashboard" class="fade-in">
    <div class="mb-6 flex flex-col sm:flex-row gap-4 justify-between items-start sm:items-center">
        
        <div class="flex items-center gap-3">
            <button id="exitCatalogBtn" class="bg-white p-2 rounded-full border border-gray-200 text-gray-500 hover:text-purple-600 hover:border-purple-400 shadow-sm transition group" title="Voltar para Pedidos">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 transform group-hover:-translate-x-1 transition" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
            </button>
            <div>
                <h2 class="text-2xl font-bold text-gray-800">Meu Catálogo Digital</h2>
                <p class="text-sm text-gray-500">Gerencie sua vitrine pública</p>
            </div>
        </div>
        
        <div class="flex flex-wrap gap-3 items-center">
            <div class="flex gap-2 text-xs font-semibold bg-white p-2 rounded-lg border border-slate-200 shadow-sm items-center h-10">
                <div class="px-2 border-r border-slate-100">
                    <span class="text-gray-400 block text-[10px] leading-tight">Itens</span>
                    <span id="catalogCountDisplay" class="text-sm text-blue-600">0/30</span>
                </div>
                <div class="px-2">
                    <span class="text-gray-400 block text-[10px] leading-tight">Vitrine</span>
                    <span id="activeCountDisplay" class="text-sm text-green-600">0/20</span>
                </div>
            </div>

            <div class="hidden sm:flex items-center bg-white border border-slate-200 rounded-lg px-2 shadow-sm h-10 max-w-[220px] transition-all focus-within:ring-2 focus-within:ring-purple-100 focus-within:border-purple-300">
                <svg class="w-4 h-4 text-gray-400 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                
                <input type="text" id="storeLinkInput" readonly 
                       class="text-xs text-gray-500 border-none focus:ring-0 w-full bg-transparent truncate font-mono select-all" 
                       placeholder="Gerando link..." value="">
                
                <div class="w-px h-4 bg-gray-200 mx-2 flex-shrink-0"></div>
                
                <button id="copyLinkBtn" class="text-gray-500 hover:text-purple-600 transition p-1 rounded-md hover:bg-purple-50 flex-shrink-0" title="Copiar Link">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                </button>
            </div>

            <a id="publicStoreLink" href="#" target="_blank" class="hidden text-gray-500 bg-white border border-slate-200 hover:text-blue-600 hover:border-blue-300 font-bold h-10 w-10 rounded-lg transition flex items-center justify-center shadow-sm" title="Ver Minha Loja">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
            </a>

            <button id="addCatalogItemBtn" class="bg-purple-600 text-white font-bold h-10 px-4 rounded-lg hover:bg-purple-700 shadow-sm transition flex items-center gap-2 text-sm">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                <span class="hidden sm:inline">Novo Produto</span>
                <span class="sm:hidden">Novo</span>
            </button>
        </div>
    </div>

    <div id="catalogList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        <div class="col-span-full flex flex-col items-center justify-center py-12 text-gray-400">
            <svg class="w-12 h-12 mb-3 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            <p>Carregando seus produtos...</p>
        </div>
    </div>
</div>
